name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════
  # Desktop 构建 — macOS (ARM64 + x64) / Windows / Linux
  # ═══════════════════════════════════════════════
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-13
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate updater signing secret
        shell: bash
        run: |
          secret='${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          secret="$(printf '%s' "$secret" | tr -d '\r\n\t ')"

          if [ -z "$secret" ]; then
            echo "::error::Missing repository secret TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            echo "$secret"
            echo "EOF"
          } >> "$GITHUB_ENV"

          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            {
              echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF"
              echo '${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}'
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Jiyu Music ${{ github.ref_name }}'
          releaseBody: |
            ## Jiyu Music ${{ github.ref_name }}

            ### Desktop Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Windows | `-setup.exe` installer |
            | Linux | `.deb` or `.AppImage` |

            This release includes Tauri updater metadata (`latest.json`).
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # ═══════════════════════════════════════════════
  # Android Mobile 构建
  # ═══════════════════════════════════════════════
  build-android-mobile:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Tauri Android project
        run: pnpm tauri android init

      - name: Build Android APK (Mobile)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_UI_MODE: mobile
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Jiyu Music Mobile ${{ github.ref_name }}'
          releaseBody: |
            ## Jiyu Music Mobile ${{ github.ref_name }}

            Android mobile build (APK).
          releaseDraft: true
          prerelease: false

  # ═══════════════════════════════════════════════
  # Android TV 构建
  # ═══════════════════════════════════════════════
  build-android-tv:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Tauri Android project
        run: pnpm tauri android init

      - name: Build Android APK (TV)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_UI_MODE: tv
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Jiyu Music TV ${{ github.ref_name }}'
          releaseBody: |
            ## Jiyu Music TV ${{ github.ref_name }}

            Android TV build (APK).
          releaseDraft: true
          prerelease: false
